<script>
// ============ 문제 풀 (총 178문제) ============
const POOL = [
  // ===== 1강. 웹 개요와 실습환경 구축 (20문제) =====
  { lec: '1강', star: 1, q: '인터넷(Internet)과 웹(Web)의 관계에 대한 설명으로 옳은 것은?',
    choices: ['인터넷과 웹은 동일한 개념이다', '웹은 인터넷 공간에서 제공하는 서비스 중 하나이다', '인터넷은 웹의 하위 서비스이다', '웹이 인터넷보다 먼저 만들어졌다'],
    answer: 1, explain: '인터넷=전 세계를 연결하는 국제 정보 통신망, 웹=그 위에서 제공되는 여러 서비스 중 하나. 이메일·FTP·텔넷도 인터넷 서비스다. 교재 그림 1-1 "인터넷 ≠ 웹".' },
  { lec: '1강', star: 1, q: '국제 웹 표준화 단체로서 HTML 표준을 제작하거나 제안하는 기관은?',
    choices: ['ARPA', 'WHATWG', 'W3C', 'IEEE'],
    answer: 2, explain: 'W3C = World Wide Web Consortium. HTML을 비롯한 웹 표준안을 제작·제안하는 국제 단체. WHATWG는 브라우저 기업 연합, ARPA는 미 국방성 부서라 헷갈리지 말 것.' },
  { lec: '1강', star: 1, q: '웹 표준 기술 3요소의 역할이 올바르게 짝지어진 것은?',
    choices: ['HTML5—동작, CSS3—구조, JavaScript—스타일', 'HTML5—구조, CSS3—스타일, JavaScript—동작', 'HTML5—스타일, CSS3—동작, JavaScript—구조', 'HTML5—구조, CSS3—동작, JavaScript—스타일'],
    answer: 1, explain: 'H(구조) / C(스타일) / J(동작) — 집을 짓고(HTML), 칠하고(CSS), 움직이게(JS) 한다고 외우면 쉽다.' },
  { lec: '1강', star: 0, q: '최초의 GUI(Graphical User Interface) 웹 브라우저는?',
    choices: ['넷스케이프(Netscape)', '인터넷 익스플로러', '모자이크(Mosaic)', '파이어폭스'],
    answer: 2, explain: '모자이크(Mosaic)가 최초의 GUI 웹 브라우저. 마크 앤드리슨의 "모자이크 커뮤니케이션"이 나중에 "넷스케이프 커뮤니케이션"으로 이름을 바꾸고, 브라우저명도 넷스케이프 내비게이터로 변경되었다.' },
  { lec: '1강', star: 1, q: 'HTML5 표준이 공식 발표된 연도는?',
    choices: ['2010년', '2012년', '2014년', '2016년'],
    answer: 2, explain: 'HTML5는 2014년 10월 발표. 교재 표 1-1 HTML 버전: HTML1(1991.10) / HTML2(1995.11) / HTML3(1997.01) / HTML4(1997.12) / HTML5(2014.10).' },
  { lec: '1강', star: 0, q: 'WWW(World Wide Web)를 1991년에 처음 발표한 사람은?',
    choices: ['마크 앤드리슨', '팀 버너스 리(Tim Berners-Lee)', '빌 게이츠', '스티브 잡스'],
    answer: 1, explain: '팀 버너스 리가 1991년 WWW를 발표하고 1993년 소스 코드를 공개했다. 마크 앤드리슨은 모자이크 브라우저를 만든 사람이니 헷갈리지 말 것.' },
  { lec: '1강', star: 1, q: 'WHATWG에 대한 설명으로 옳은 것은?',
    choices: ['미국 국방성 산하의 연구 기관이다', '웹 브라우저 제공 기업들이 조직한 웹 표준 기관이다', 'W3C의 전신이다', 'HTML 교재를 출판하는 단체이다'],
    answer: 1, explain: 'WHATWG는 브라우저 기업들이 조직한 실무적 웹 표준 기관. 이들이 만든 "Web Application 1.0" 표준을 W3C가 채택해 이름을 HTML5로 바꾸고 W3C와 공동 작성하게 되었다.' },
  { lec: '1강', star: 1, q: '웹 2.0(Web 2.0)의 개념으로 가장 적절한 것은?',
    choices: ['사용자가 함께 새로운 콘텐츠를 창조하는 시대', '자바스크립트를 처음 도입한 단계', 'W3C가 공식 표준화한 최초의 웹', '인터넷 익스플로러 전용 웹 기술'],
    answer: 0, explain: '웹 2.0 = 사용자 참여형 웹. 유튜브(동영상 생태계), 위키피디아(거대한 사전), 깃허브(코드 공유) 모두 "공간 + 많은 사용자" 조합의 예.' },
  { lec: '1강', star: 0, q: '1969년 아파넷(ARPANET)을 개발한 미국 국방성 부서는?',
    choices: ['W3C', 'ARPA', 'WHATWG', 'IEEE'],
    answer: 1, explain: 'ARPA = Advanced Research Projects Agency, 미 국방성 부서. 1969년 ARPANET 개발 → 1995년 인터넷이 전 세계에 연결되어 일반인 사용.' },
  { lec: '1강', star: 1, q: '웹 표준 기술 3요소 중 "스타일"을 담당하는 것은?',
    choices: ['HTML5', 'CSS3', 'JavaScript', 'XML'],
    answer: 1, explain: 'CSS3(Cascading Style Sheets) = 스타일 담당. HTML 페이지에 스타일을 지정하는 스타일시트 언어.' },
  { lec: '1강', star: 1, q: '웹 표준 기술 3요소 중 "동작"을 담당하는 것은?',
    choices: ['HTML5', 'CSS3', 'JavaScript', 'PHP'],
    answer: 2, explain: 'JavaScript = 동작(사용자 반응 처리) 담당. HTML 페이지에서 사용자 반응 등을 처리하는 스크립트 언어.' },
  { lec: '1강', star: 0, q: '웹 브라우저(Web Browser)의 역할로 가장 적절한 것은?',
    choices: ['웹에 공개된 정보를 탐색할 수 있게 하는 프로그램', '서버에서 HTML을 생성하는 프로그램', '데이터베이스를 관리하는 프로그램', '코드를 컴파일하는 프로그램'],
    answer: 0, explain: '웹 브라우저는 사용자가 웹에 공개된 정보를 탐색·표시할 수 있게 해주는 프로그램. 크롬·엣지·사파리·파이어폭스 등이 해당.' },
  { lec: '1강', star: 1, q: '웹에서 요청과 응답 과정의 설명으로 옳은 것은?',
    choices: ['서버가 먼저 클라이언트에 페이지를 배포한다', '클라이언트(사용자)가 요청하면 서버(제공자)가 응답한다', '클라이언트끼리 직접 통신한다', '서버가 응답하지 않아도 페이지가 표시된다'],
    answer: 1, explain: '웹은 클라이언트(사용자) → 서버(제공자) 요청 → 서버가 HTML 페이지·파일로 응답하는 구조. 교재의 "치킨집 배달" 비유(주문=요청, 배달=응답) 참고.' },
  { lec: '1강', star: 1, q: 'URL(Uniform Resource Locator)에 대한 설명으로 옳은 것은?',
    choices: ['웹 페이지의 제목을 표시하는 텍스트', '웹에서 어떤 대상을 구분하는 주소', '서버의 MAC 주소', 'HTML 파일의 파일명만을 의미'],
    answer: 1, explain: 'URL은 웹에서 어떤 대상(웹 페이지·이미지·파일 등)을 구분하는 주소. 브라우저에 URL을 입력하면 해당 서버에 페이지를 요청한다.' },

    answer: 2, explain: '-ms-=Microsoft(Edge·IE 계열).' },

// ============ 출제 설정 ============
const PICK_PER_LEC = {
  '1강': 3, '2강': 4, '3강': 5, '4강': 6, '5강': 5, '6강': 6, '7강': 4,
};
const LECTURES = ['1강', '2강', '3강', '4강', '5강', '6강', '7강'];

// ============ 유틸 ============
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const escapeHtml = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const inlineCode = (s) => {
  return escapeHtml(s)
    .replace(/&lt;[^&]*?&gt;/g, m => `<code>${m}</code>`)
    .replace(/(^|\s)(#\w+|\.\w+|:\w+(?:-\w+)*(?:\([^)]*\))?|[-\w]+: ?[^;,]+;?)(?=\s|$|,|\.)/g, (m, pre, code) => `${pre}<code>${code}</code>`);
};

// ============ 상태 ============
const state = {
  questions: [],     // 현재 세션에 뽑힌 33문제
  answers: {},       // 인덱스 -> 선택한 choice index
  revealed: {},      // 인덱스 -> boolean
  filter: 'all',
  seenIds: new Set(), // 이전 라운드에 출제된 문제 — 새 라운드에서 제외
};

// 보기(choices) 순서를 섞으면서 정답 인덱스를 재계산
function shuffleChoices(q) {
  const indexed = q.choices.map((c, idx) => ({ c, idx }));
  const sh = shuffle(indexed);
  return {
    ...q,
    choices: sh.map(x => x.c),
    answer: sh.findIndex(x => x.idx === q.answer),
  };
}

// ============ 문제 추첨 ============
// 방금 나온 문제는 다음 라운드에서 제외. 해당 강의의 미출제 풀이 부족하면 그 강의만 히스토리 리셋.
function pickQuestions() {
  const picked = [];
  for (const lec of LECTURES) {
    const pool = POOL.filter(q => q.lec === lec);
    let available = pool.filter(q => !state.seenIds.has(q.q));
    if (available.length < PICK_PER_LEC[lec]) {
      pool.forEach(q => state.seenIds.delete(q.q));
      available = pool.slice();
    }
    const shuffled = shuffle(available);
    const chosen = shuffled.slice(0, PICK_PER_LEC[lec]);
    chosen.forEach(q => state.seenIds.add(q.q));
    // 보기 순서도 매 라운드 섞음
    picked.push(...chosen.map(shuffleChoices));
  }
  // 화면 표시 순서는 강 순서대로 유지 (각 강 내부도 이미 셔플된 상태)
  return picked;
}

function newRound() {
  state.questions = pickQuestions();
  state.answers = {};
  state.revealed = {};
  state.filter = 'all';
  document.getElementById('result-card').classList.remove('show');
  renderFilters();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ 렌더링 ============
function render() {
  const container = document.getElementById('quiz-container');
  const list = state.filter === 'all'
    ? state.questions.map((q, i) => ({ q, i }))
    : state.questions.map((q, i) => ({ q, i })).filter(x => x.q.lec === state.filter);

  container.innerHTML = list.map(({ q, i }) => {
    const selected = state.answers[i];
    const revealed = state.revealed[i];
    const isCorrect = selected === q.answer;
    const cardClass = revealed ? (isCorrect ? 'answered-correct' : 'answered-wrong') : '';
    const stars = '⭐'.repeat(q.star);
    const codeBlock = q.code ? `<pre class="q-codeblock">${escapeHtml(q.code)}</pre>` : '';

    const choicesHtml = q.choices.map((c, ci) => {
      let cls = 'choice';
      if (revealed) {
        cls += ' disabled';
        if (ci === q.answer) cls += ' correct';
        else if (ci === selected) cls += ' wrong';
      } else if (selected === ci) {
        cls += ' selected';
      }
      return `
        <div class="${cls}" data-qi="${i}" data-ci="${ci}">
          <div class="choice-num">${ci + 1}</div>
          <div class="choice-text">${inlineCode(c)}</div>
        </div>
      `;
    }).join('');

    const explainHtml = revealed ? `
      <div class="explain show">
        <span class="explain-label">${isCorrect ? '✅ 정답!' : '❌ 오답'}</span>
        ${escapeHtml(q.explain)}
      </div>
    ` : '';

    return `
      <div class="question-card ${cardClass}" id="q-${i}">
        <div class="q-header">
          <span class="q-num">Q${i + 1}</span>
          <span class="q-tag">${q.lec}</span>
          <span class="q-star">${stars}</span>
        </div>
        <div class="q-text">${inlineCode(q.q)}</div>
        ${codeBlock}
        <div class="choices">${choicesHtml}</div>
        ${explainHtml}
      </div>
    `;
  }).join('');

  container.querySelectorAll('.choice').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const ci = parseInt(el.dataset.ci);
      state.answers[qi] = ci;
      state.revealed[qi] = true;
      render();
    });
  });

  updateProgress();
}

function updateProgress() {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(answered / total) * 100}%`;
  document.getElementById('score-badge').textContent = `정답 ${correct}`;
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const items = ['all', ...LECTURES];
  bar.innerHTML = items.map(l => {
    const label = l === 'all' ? `전체 (${state.questions.length})` : `${l} (${state.questions.filter(q => q.lec === l).length})`;
    const cls = state.filter === l ? 'filter-btn active' : 'filter-btn';
    return `<button class="${cls}" data-filter="${l}">${label}</button>`;
  }).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filter = btn.dataset.filter;
      renderFilters();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function renderPoolInfo() {
  const info = document.getElementById('pool-info');
  const perLec = LECTURES.map(l => `${l} ${POOL.filter(q => q.lec === l).length}`).join(' · ');
  info.textContent = `전체 문제 풀: ${POOL.length}문제 (${perLec})`;
}

// ============ 이벤트 ============
document.getElementById('submit-btn').addEventListener('click', () => {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  const percent = Math.round((correct / total) * 100);

  const breakdown = LECTURES.map(l => {
    const lecQs = state.questions.map((q, i) => ({ q, i })).filter(x => x.q.lec === l);
    const lecCorrect = lecQs.filter(x => state.answers[x.i] === x.q.answer).length;
    return `${l} ${lecCorrect}/${lecQs.length}`;
  });

  const card = document.getElementById('result-card');
  document.getElementById('result-score').textContent = `${correct} / ${total}`;
  document.getElementById('result-detail').textContent = `정답률 ${percent}% · 응답 ${answered}문제`;

  let msg;
  if (percent >= 90) msg = '🎉 완벽해요! 시험장 가셔도 됩니다';
  else if (percent >= 75) msg = '👍 좋아요! 틀린 문제만 다시 복습하세요';
  else if (percent >= 60) msg = '💪 조금만 더! 오답 해설 꼼꼼히 읽기';
  else msg = '📚 기본 개념부터 다시 한 번 정리하세요';
  document.getElementById('result-message').textContent = msg;
  document.getElementById('result-breakdown').innerHTML = breakdown.map(b => `<span>${b}</span>`).join('');

  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (Object.keys(state.revealed).length === 0 || confirm('새 문제 33개를 랜덤으로 뽑아 다시 시작할까요?')) {
    newRound();
  }
});

// ============ 초기화 ============
renderPoolInfo();
newRound();
</script>
