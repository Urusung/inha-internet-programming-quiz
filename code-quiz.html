    explain: 'border-radius: 50%는 네 모서리를 요소 크기의 절반만큼 둥글게 만든다 → 정사각형이면 완벽한 원. 가로≠세로이면 타원 모양이 된다. float: left + margin-right는 이미지 왼쪽 배치 + 텍스트가 이미지 오른쪽으로 흘러감.' },
];

// ============ 상태 ============
const LECTURES = ['2강', '3강', '4강', '5강', '6강', '7강'];
const TYPE_LABEL = {
  fill: '빈칸', predict: '실행결과', error: '오류찾기', interpret: '코드해석'
};

const state = {
  questions: [],
  answers: {},
  revealed: {},
  filter: 'all',
  mode: '20',
  seenIds: new Set(),
};

// ============ 유틸 ============
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const escapeHtml = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const inlineCode = (s) => {
  return escapeHtml(s)
    .replace(/&lt;[^&]*?&gt;/g, m => `<code>${m}</code>`)
    .replace(/(^|\s)(#\w+|\.\w+|:\w+(?:-\w+)*(?:\([^)]*\))?|[-\w]+: ?[^;,]+;?)(?=\s|$|,|\.)/g, (m, pre, code) => `${pre}<code>${code}</code>`);
};

// 보기(choices) 순서를 섞으면서 정답 인덱스를 재계산
function shuffleChoices(q) {
  const indexed = q.choices.map((c, idx) => ({ c, idx }));
  const sh = shuffle(indexed);
  return {
    ...q,
    choices: sh.map(x => x.c),
    answer: sh.findIndex(x => x.idx === q.answer),
  };
}

// ============ 문제 추첨 ============
function pickQuestions() {
  if (state.mode === 'all') {
    const out = [];
    for (const lec of LECTURES) {
      out.push(...shuffle(POOL.filter(q => q.lec === lec)));
    }
    return out.map(shuffleChoices);
  }
  if (state.mode === 'ex') {
    const out = [];
    for (const lec of LECTURES) {
      out.push(...POOL.filter(q => q.lec === lec && q.fromExercise));
    }
    return out.map(shuffleChoices);
  }
  // 랜덤 20: 연습문제 10 전부(고정) + 비연습 10개 강별 균형 추첨
  // 방금 나온 비연습 문제는 다음 라운드에서 제외. 남은 풀이 부족하면 비연습 히스토리 리셋.
  const target = 20;
  const exQs = POOL.filter(q => q.fromExercise);
  const remaining = target - exQs.length;
  const nonExAll = POOL.filter(q => !q.fromExercise);
  if (nonExAll.filter(q => !state.seenIds.has(q.q)).length < remaining) {
    nonExAll.forEach(q => state.seenIds.delete(q.q));
  }
  const nonExPool = {};
  LECTURES.forEach(l => {
    nonExPool[l] = POOL.filter(q => q.lec === l && !q.fromExercise && !state.seenIds.has(q.q));
  });
  const perLec = {};
  LECTURES.forEach(l => perLec[l] = 0);
  let totalAvail = 0;
  LECTURES.forEach(l => totalAvail += nonExPool[l].length);
  let assigned = 0;
  if (totalAvail > 0) {
    LECTURES.forEach(l => {
      const share = Math.floor((nonExPool[l].length / totalAvail) * remaining);
      perLec[l] = Math.min(share, nonExPool[l].length);
      assigned += perLec[l];
    });
  }
  const order = [...LECTURES].sort((a,b) => nonExPool[b].length - nonExPool[a].length);
  let safety = 0;
  while (assigned < remaining && safety++ < 100) {
    let advanced = false;
    for (const l of order) {
      if (perLec[l] < nonExPool[l].length) {
        perLec[l]++;
        assigned++;
        advanced = true;
        if (assigned >= remaining) break;
      }
    }
    if (!advanced) break;
  }
  const picked = [];
  for (const lec of LECTURES) {
    const lecEx = exQs.filter(q => q.lec === lec);
    const lecNonEx = shuffle(nonExPool[lec]).slice(0, perLec[lec]);
    lecNonEx.forEach(q => state.seenIds.add(q.q));
    picked.push(...shuffle([...lecEx, ...lecNonEx]));
  }
  // 보기 순서도 매 라운드 섞음
  return picked.map(shuffleChoices);
}

function newRound() {
  state.questions = pickQuestions();
  state.answers = {};
  state.revealed = {};
  state.filter = 'all';
  document.getElementById('result-card').classList.remove('show');
  renderFilters();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ 렌더링 ============
function render() {
  const container = document.getElementById('quiz-container');
  const list = state.filter === 'all'
    ? state.questions.map((q, i) => ({ q, i }))
    : state.questions.map((q, i) => ({ q, i })).filter(x => x.q.lec === state.filter);

  container.innerHTML = list.map(({ q, i }) => {
    const selected = state.answers[i];
    const revealed = state.revealed[i];
    const isCorrect = selected === q.answer;
    const cardClass = revealed ? (isCorrect ? 'answered-correct' : 'answered-wrong') : '';
    const stars = '⭐'.repeat(q.star);
    const codeBlock = q.code ? `<pre class="q-codeblock">${escapeHtml(q.code)}</pre>` : '';
    const typeLabel = TYPE_LABEL[q.type] || '기본';
    const exerciseBadge = q.fromExercise ? `<span class="q-exercise">📘 연습문제</span>` : '';

    const choicesHtml = q.choices.map((c, ci) => {
      let cls = 'choice';
      if (revealed) {
        cls += ' disabled';
        if (ci === q.answer) cls += ' correct';
        else if (ci === selected) cls += ' wrong';
      } else if (selected === ci) {
        cls += ' selected';
      }
      return `
        <div class="${cls}" data-qi="${i}" data-ci="${ci}">
          <div class="choice-num">${ci + 1}</div>
          <div class="choice-text">${inlineCode(c)}</div>
        </div>
      `;
    }).join('');

    const explainHtml = revealed ? `
      <div class="explain show">
        <span class="explain-label">${isCorrect ? '✅ 정답!' : '❌ 오답'}</span>
        ${escapeHtml(q.explain)}
      </div>
    ` : '';

    return `
      <div class="question-card ${cardClass}" id="q-${i}">
        <div class="q-header">
          <span class="q-num">Q${i + 1}</span>
          <span class="q-tag">${q.lec}</span>
          <span class="q-type ${q.type}">${typeLabel}</span>
          ${exerciseBadge}
          <span class="q-star">${stars}</span>
        </div>
        <div class="q-text">${inlineCode(q.q)}</div>
        ${codeBlock}
        <div class="choices">${choicesHtml}</div>
        ${explainHtml}
      </div>
    `;
  }).join('');

  container.querySelectorAll('.choice').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const ci = parseInt(el.dataset.ci);
      state.answers[qi] = ci;
      state.revealed[qi] = true;
      render();
    });
  });

  updateProgress();
}

function updateProgress() {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-fill').style.width = total ? `${(answered / total) * 100}%` : '0%';
  document.getElementById('score-badge').textContent = `정답 ${correct}`;
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const items = ['all', ...LECTURES];
  bar.innerHTML = items.map(l => {
    const label = l === 'all' ? `전체 (${state.questions.length})` : `${l} (${state.questions.filter(q => q.lec === l).length})`;
    const cls = state.filter === l ? 'filter-btn active' : 'filter-btn';
    return `<button class="${cls}" data-filter="${l}">${label}</button>`;
  }).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filter = btn.dataset.filter;
      renderFilters();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function renderPoolInfo() {
  const info = document.getElementById('pool-info');
  const perLec = LECTURES.map(l => `${l} ${POOL.filter(q => q.lec === l).length}`).join(' · ');
  const exCount = POOL.filter(q => q.fromExercise).length;
  info.textContent = `코드 문제 풀: ${POOL.length}문제 (연습문제 ${exCount}) · ${perLec}`;
}

// ============ 이벤트 ============
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    newRound();
  });
});

document.getElementById('submit-btn').addEventListener('click', () => {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  const percent = total ? Math.round((correct / total) * 100) : 0;

  const breakdown = LECTURES.map(l => {
    const lecQs = state.questions.map((q, i) => ({ q, i })).filter(x => x.q.lec === l);
    if (lecQs.length === 0) return null;
    const lecCorrect = lecQs.filter(x => state.answers[x.i] === x.q.answer).length;
    return `${l} ${lecCorrect}/${lecQs.length}`;
  }).filter(Boolean);

  const card = document.getElementById('result-card');
  document.getElementById('result-score').textContent = `${correct} / ${total}`;
  document.getElementById('result-detail').textContent = `정답률 ${percent}% · 응답 ${answered}문제`;

  let msg;
  if (percent >= 90) msg = '🎉 완벽해요! 코드 문제는 자신 있네요';
  else if (percent >= 75) msg = '👍 좋아요! 틀린 문제 해설만 읽어보세요';
  else if (percent >= 60) msg = '💪 한 번 더! 오답 해설 꼼꼼히';
  else msg = '📚 코드 읽기 연습이 더 필요해요';
  document.getElementById('result-message').textContent = msg;
  document.getElementById('result-breakdown').innerHTML = breakdown.map(b => `<span>${b}</span>`).join('');

  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  const label = state.mode === 'all' ? '전체 40문제' : (state.mode === 'ex' ? '연습문제 10개' : '랜덤 20문제');
  if (Object.keys(state.revealed).length === 0 || confirm(`${label}로 다시 시작할까요?`)) {
    newRound();
  }
});

// ============ 초기화 ============
renderPoolInfo();
newRound();
</script>
</body>
