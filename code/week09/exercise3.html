<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Week09 연습문제 Step3</title>
<style>
  .container {
    width: 1080px;
    margin: 0 auto 8px;
    overflow: hidden;
  }

  .left {
    float: left;
    width: 740px;
    height: 428px;
    background: red;
  }

  .right {
    float: right;
    width: 332px;
    height: 428px;
    background: blue;
  }

  .gnb {
    float: left;
    margin: 0;
    padding: 8px 0;
    background: green;
  }

  .gnb li {
    float: left;
    list-style-type: none;
    padding-left: 16px;
  }

  .gnb li:first-child {
    padding-left: 0;
  }

  .rank {
    float: right;
    margin: 0;
    padding: 8px 0;
    background: yellow;
  }

  .rank li {
    list-style-type: none;
  }

  .footer {
    height: 80px;
    background: yellow;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Logo</h1>
  </div>

  <div class="container">
    <ul class="gnb">
      <li>메일</li>
      <li>카페</li>
      <li>블로그</li>
      <li>쇼핑</li>
      <li>사전</li>
      <li>뉴스</li>
      <li>증권</li>
      <li>부동산</li>
      <li>지도</li>
    </ul>

    <ul class="rank">
      <li>실시간 검색 순위</li>
    </ul>
  </div>

  <div class="container">
    <div class="left"></div>
    <div class="right"></div>
  </div>

  <div class="container">
    <div class="footer"></div>
  </div>
</body>
</html>
