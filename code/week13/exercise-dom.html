<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Week13 DOM 연습문제</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 24px;
    font-family: Arial, "Noto Sans KR", sans-serif;
    line-height: 1.6;
    color: #222;
  }

  section {
    max-width: 720px;
    margin: 0 auto 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid #ddd;
  }

  h1 {
    margin: 0 0 12px;
  }

  .note {
    margin: 0 0 16px;
    color: #555;
  }

  .result {
    padding: 14px 16px;
    border: 1px solid #ddd;
    background: #fafafa;
  }

  .query h2 {
    margin: 10px 0;
  }
</style>
</head>
<body>
  <section>
    <h1>연습문제 1</h1>
    <p class="note">
      head에서 문서 객체를 바로 선택하면 body의 h1이 아직 생성되지 않아 null 문제가 발생합니다.
      DOMContentLoaded 이후에 선택하면 정상적으로 조작할 수 있습니다.
    </p>
    <div class="result">
      <h2 id="element">Lorem ipsum dolor amet</h2>
    </div>
  </section>

  <section class="query">
    <h1>연습문제 2</h1>
    <p class="note">
      querySelector('h2')는 조건에 맞는 첫 번째 문서 객체만 선택합니다.
    </p>
    <h2>Header - 1</h2>
    <h2>Header - 2</h2>
    <h2>Header - 3</h2>
  </section>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var element = document.getElementById('element');
      element.style.color = 'red';
      element.innerHTML = 'From JavaScript';

      var header = document.querySelector('.query h2');
      header.style.color = 'white';
      header.style.backgroundColor = 'black';
    });
  </script>
</body>
</html>
