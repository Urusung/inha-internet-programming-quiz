function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  return escapeHtml(s)
    .replace(/&lt;[^&]*?&gt;/g, m => `<code>${m}</code>`)
    .replace(/(^|\s)(#\w+|\.\w+|:\w+(?:-\w+)*(?:\([^)]*\))?|[-\w]+: ?[^;,]+;?)(?=\s|$|,|\.)/g, (m, pre, code) => `${pre}<code>${code}</code>`);
};

// ============ 상태 ============
const state = {
  questions: [],     // 현재 세션에 뽑힌 문제
  answers: {},       // 인덱스 -> 선택한 choice index
  revealed: {},      // 인덱스 -> boolean
  filter: 'all',
  seenIds: new Set(), // 이전 라운드에 출제된 문제 — 새 라운드에서 제외
};

// 보기(choices) 순서를 섞으면서 정답 인덱스를 재계산
function shuffleChoices(q) {
  const indexed = q.choices.map((c, idx) => ({ c, idx }));
  const sh = shuffle(indexed);
  return {
    ...q,
    choices: sh.map(x => x.c),
    answer: sh.findIndex(x => x.idx === q.answer),
  };
}

// ============ 문제 추첨 ============
// 방금 나온 문제는 다음 라운드에서 제외. 해당 강의의 미출제 풀이 부족하면 그 강의만 히스토리 리셋.
function pickQuestions() {
  const picked = [];
  for (const lec of LECTURES) {
    const pool = POOL.filter(q => q.lec === lec);
    let available = pool.filter(q => !state.seenIds.has(q.q));
    if (available.length < PICK_PER_LEC[lec]) {
      pool.forEach(q => state.seenIds.delete(q.q));
      available = pool.slice();
    }
    const shuffled = shuffle(available);
    const chosen = shuffled.slice(0, PICK_PER_LEC[lec]);
    chosen.forEach(q => state.seenIds.add(q.q));
    // 보기 순서도 매 라운드 섞음
    picked.push(...chosen.map(shuffleChoices));
  }
  // 화면 표시 순서는 강 순서대로 유지 (각 강 내부도 이미 셔플된 상태)
  return picked;
}

function newRound() {
  state.questions = pickQuestions();
  state.answers = {};
  state.revealed = {};
  state.filter = 'all';
  document.getElementById('result-card').classList.remove('show');
  renderFilters();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ 렌더링 ============
function render() {
  const container = document.getElementById('quiz-container');
  const list = state.filter === 'all'
    ? state.questions.map((q, i) => ({ q, i }))
    : state.questions.map((q, i) => ({ q, i })).filter(x => x.q.lec === state.filter);

  container.innerHTML = list.map(({ q, i }) => {
    const selected = state.answers[i];
    const revealed = state.revealed[i];
    const isCorrect = selected === q.answer;
    const cardClass = revealed ? (isCorrect ? 'answered-correct' : 'answered-wrong') : '';
    const stars = '⭐'.repeat(q.star);
    const codeBlock = q.code ? `<pre class="q-codeblock">${escapeHtml(q.code)}</pre>` : '';

    const choicesHtml = q.choices.map((c, ci) => {
      let cls = 'choice';
      if (revealed) {
        cls += ' disabled';
        if (ci === q.answer) cls += ' correct';
        else if (ci === selected) cls += ' wrong';
      } else if (selected === ci) {
        cls += ' selected';
      }
      return `
        <div class="${cls}" data-qi="${i}" data-ci="${ci}">
          <div class="choice-num">${ci + 1}</div>
          <div class="choice-text">${inlineCode(c)}</div>
        </div>
      `;
    }).join('');

    const explainHtml = revealed ? `
      <div class="explain show">
        <span class="explain-label">${isCorrect ? '✅ 정답!' : '❌ 오답'}</span>
        ${escapeHtml(q.explain)}
      </div>
    ` : '';

    return `
      <div class="question-card ${cardClass}" id="q-${i}">
        <div class="q-header">
          <span class="q-num">Q${i + 1}</span>
          <span class="q-tag">${q.lec}</span>
          <span class="q-star">${stars}</span>
        </div>
        <div class="q-text">${inlineCode(q.q)}</div>
        ${codeBlock}
        <div class="choices">${choicesHtml}</div>
        ${explainHtml}
      </div>
    `;
  }).join('');

  container.querySelectorAll('.choice').forEach(el => {
    if (el.classList.contains('disabled')) return;
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const ci = parseInt(el.dataset.ci);
      state.answers[qi] = ci;
      state.revealed[qi] = true;
      render();
    });
  });

  updateProgress();
}

function updateProgress() {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(answered / total) * 100}%`;
  document.getElementById('score-badge').textContent = `정답 ${correct}`;
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const items = ['all', ...LECTURES];
  bar.innerHTML = items.map(l => {
    const label = l === 'all' ? `전체 (${state.questions.length})` : `${l} (${state.questions.filter(q => q.lec === l).length})`;
    const cls = state.filter === l ? 'filter-btn active' : 'filter-btn';
    return `<button class="${cls}" data-filter="${l}">${label}</button>`;
  }).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.filter = btn.dataset.filter;
      renderFilters();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function renderPoolInfo() {
  const info = document.getElementById('pool-info');
  const perLec = LECTURES.map(l => `${l} ${POOL.filter(q => q.lec === l).length}`).join(' · ');
  info.textContent = `전체 문제 풀: ${POOL.length}문제 (${perLec})`;
}

// ============ 이벤트 ============
document.getElementById('submit-btn').addEventListener('click', () => {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = state.questions.filter((q, i) => state.answers[i] === q.answer).length;
  const percent = Math.round((correct / total) * 100);

  const breakdown = LECTURES.map(l => {
    const lecQs = state.questions.map((q, i) => ({ q, i })).filter(x => x.q.lec === l);
    const lecCorrect = lecQs.filter(x => state.answers[x.i] === x.q.answer).length;
    return `${l} ${lecCorrect}/${lecQs.length}`;
  });

  const card = document.getElementById('result-card');
  document.getElementById('result-score').textContent = `${correct} / ${total}`;
  document.getElementById('result-detail').textContent = `정답률 ${percent}% · 응답 ${answered}문제`;

  let msg;
  if (percent >= 90) msg = '🎉 완벽해요! 시험장 가셔도 됩니다';
  else if (percent >= 75) msg = '👍 좋아요! 틀린 문제만 다시 복습하세요';
  else if (percent >= 60) msg = '💪 조금만 더! 오답 해설 꼼꼼히 읽기';
  else msg = '📚 기본 개념부터 다시 한 번 정리하세요';
  document.getElementById('result-message').textContent = msg;
  document.getElementById('result-breakdown').innerHTML = breakdown.map(b => `<span>${b}</span>`).join('');

  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (Object.keys(state.revealed).length === 0 || confirm(`새 문제 ${state.questions.length}개를 랜덤으로 뽑아 다시 시작할까요?`)) {
    newRound();
  }
});

// ============ 초기화 ============
renderPoolInfo();
newRound();
</script>
</body>
</html>
